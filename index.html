const ALL_SYMPTOMS = [...PUCK_SYMPTOMS, ...SPRAY_SYMPTOMS];

function DiagnoseTab() {
  const [selected, setSelected] = useState(null);
  const [category, setCategory] = useState("all");

  const filtered = ALL_SYMPTOMS.filter(s => category === "all" || s.category === category);
  const active = selected ? ALL_SYMPTOMS.find(s => s.id === selected) : null;

  return (
    <div>
      {/* Category filter */}
      <div className="cat-filter" style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["all", "All Issues"], ["puck", "💧 Soggy Puck"], ["spray", "💥 Spraying"]].map(([val, label]) => (
          <button key={val} onClick={() => { setCategory(val); setSelected(null); }} style={{
            padding: "8px 16px", borderRadius: 8,
            background: category === val ? "#c17f3c" : "transparent",
            border: `1px solid ${category === val ? "#c17f3c" : "#2a1a0e"}`,
            color: category === val ? "#0f0905" : "#7a5a3a",
            fontFamily: "'DM Mono', monospace", fontSize: 11,
            letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer",
          }}>{label}</button>
        ))}
      </div>

      {/* Symptom grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: active ? 20 : 0 }}>
        {filtered.map(s => (
          <button key={s.id} onClick={() => setSelected(selected === s.id ? null : s.id)} style={{
            background: selected === s.id ? "#1f1208" : "#1a0f08",
            border: `1px solid ${selected === s.id ? "#c17f3c" : "#2a1a0e"}`,
            borderRadius: 10, padding: "14px 16px",
            display: "flex", alignItems: "center", gap: 12,
            cursor: "pointer", textAlign: "left",
          }}>
            <span style={{ fontSize: 24 }}>{s.emoji}</span>
            <div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: selected === s.id ? "#c17f3c" : "#f0e4d0", fontWeight: 500 }}>{s.label}</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#5a3a1a", marginTop: 2, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                {s.category === "puck" ? "Puck" : "Spray"}
              </div>
            </div>
          </button>
        ))}
      </div>

      {/* Detail panel */}
      {active && (
        <div className="slide-in" style={{ background: "#1a0f08", border: "1px solid #c17f3c", borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "20px 24px", borderBottom: "1px solid #2a1a0e", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 32 }}>{active.emoji}</span>
            <div>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#f0e4d0" }}>{active.label}</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#c17f3c", marginTop: 2, textTransform: "uppercase", letterSpacing: "0.1em" }}>
                {active.causes.length} known causes · {active.fixes.length} fixes for your setup
              </div>
            </div>
          </div>

          {/* Causes */}
          <div style={{ padding: "20px 24px", borderBottom: "1px solid #1f1208" }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#7a5a3a", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>Why it's happening</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {active.causes.map((c, i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#2a1a0e", color: "#7a5a3a", fontFamily: "'DM Mono', monospace", fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>{i+1}</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: "#9a7a5a", lineHeight: 1.7 }}>{c}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Fixes */}
          <div style={{ padding: "20px 24px" }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#7a5a3a", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>Fix it — with your gear</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {active.fixes.map((fix, i) => (
                <div key={i} style={{ background: "#130b05", borderRadius: 8, padding: 14, borderLeft: "3px solid #3a2010" }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#c17f3c", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>{fix.tool}</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: "#c0a080", lineHeight: 1.7 }}>{fix.action}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* General principles */}
      {!active && (
        <div style={{ background: "#1a0f08", border: "1px solid #2a1a0e", borderRadius: 12, padding: 20, marginTop: 8 }}>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#c17f3c", marginBottom: 14 }}>The Golden Rules for Your Setup</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[
              ["Flush first", "Always purge the Stone group head 2–3 seconds before locking the portafilter. Removes stale hot water sitting in the screen."],
              ["WDT is the most important step", "Your bottomless PF will expose every distribution flaw. 20–30 seconds of thorough needle stirring — radial and circular — eliminates the micro-voids that cause channeling."],
              ["Gravity disc after WDT, not instead of", "WDT breaks clumps. The Normcore disc levels. You need both, in that order. Disc-only skips the clump-breaking step."],
              ["First drip timing", "On the Stone at 9 bar, first drip should appear at 6–8 seconds from pump start. Earlier = too coarse or under-dosed. Later = too fine or over-dosed."],
              ["Bottomless tells the truth", "A centered, golden, unified stream = good prep. Any split, spray, or blonde streak = go back to distribution. The grinder is rarely the first culprit."],
            ].map(([title, body]) => (
              <div key={title} style={{ borderBottom: "1px solid #1f1208", paddingBottom: 10 }}>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#f0e4d0", marginBottom: 4 }}>{title}</div>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#5a3a1a", lineHeight: 1.7 }}>{body}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function EspressoApp() {
  const [activeTab, setActiveTab] = useState("log");
  const [shots, setShots] = useState(() => {
    try { return JSON.parse(localStorage.getItem("espresso_shots") || "[]"); } catch { return []; }
  });
  const [form, setForm] = useState({ ...defaultShot });
  const [checklist, setChecklist] = useState({});
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    try { localStorage.setItem("espresso_shots", JSON.stringify(shots)); } catch {}
  }, [shots]);

  const ratio = form.yield && form.dose ? (form.yield / form.dose).toFixed(1) : "–";

  const handleSave = () => {
    setShots(prev => [{ ...form, id: Date.now() }, ...prev]);
    setSaved(true);
    setForm({ ...defaultShot });
    setChecklist({});
    setTimeout(() => setSaved(false), 2000);
  };

  const deleteShot = (id) => setShots(prev => prev.filter(s => s.id !== id));

  const tasteFor = (val) => TASTE_OPTIONS.find(t => t.value === val) || TASTE_OPTIONS[2];

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0f0905",
      color: "#f0e4d0",
      fontFamily: "'Georgia', serif",
    }}>
      <style>{`

        ::-webkit-scrollbar-track { background: #1a0f08; }
        ::-webkit-scrollbar-thumb { background: #5a3a1a; border-radius: 2px; }

        .step-card { transition: border-color 0.2s; }

        .del-btn:hover { opacity: 1; }
        input, textarea, select { font-family: 'DM Mono', monospace; }
        .pulse { animation: pulse 0.4s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 640px) {
          .hdr { flex-direction: column !important; align-items: flex-start !important; gap: 14px; padding: 14px 16px !important; }
          .nav-row { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; flex-wrap: nowrap !important; padding-bottom: 2px; }
          .nav-row::-webkit-scrollbar { display: none; }
          .nav-row button { flex-shrink: 0; }
          .ratio-row { flex-wrap: wrap !important; gap: 16px !important; padding: 16px !important; }
          .ratio-div { display: none !important; }
          .grid-3 { grid-template-columns: 1fr 1fr !important; }
          .grid-3 > *:last-child { grid-column: span 2; }

                      </div>
                    ))}
                  </div>
                  <div style={{ padding: "14px 20px", borderTop: "1px solid #1f1208" }}>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#7a5a3a", lineHeight: 1.7 }}>{bean.tip}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* GEAR TAB */}
        {activeTab === "gear" && (
          <div className="slide-in">
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, marginBottom: 8, color: "#c17f3c" }}>
              Your Setup
            </div>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#5a3a1a", marginBottom: 28 }}>
              Calibrated for your specific equipment
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {[
                {
                  name: "Stone Espresso",
                  role: "Machine",
                  specs: [["Boiler", "1.5L dual boiler"], ["Heating system", "200W"], ["Steam chamber", "0.8L"], ["Water tank", "1.2L (removable)"], ["Power", "1000W"], ["Target temp", "92–96°C"]],
                  note: "Allow full warm-up time before pulling. The Stone's dual boiler means stable brew temp independent of steam."
                },
                {
                  name: "Fellow Opus",
                  role: "Grinder",
                  specs: [["Burrs", "40mm conical C6-40"], ["Macro steps", "41 total, 1–3 for espresso"], ["Micro ring", "6 steps per macro"], ["Retention", "~0.5–0.8g typical"], ["Tip", "Tap body after grinding to release grounds"]],
                  note: "For 58mm basket: start at macro 2, micro 3. Finer = more extraction. Each micro click = ~⅓ of a macro step."
                },
                {
                  name: "Normcore 58mm Bottomless",
                  role: "Portafilter",
                  specs: [["Size", "58mm"], ["Type", "Bottomless / naked"], ["Capacity", "18–22g VST-compatible"]],
                  note: "Bottomless reveals channeling visually. Ideal channels = centered, consistent golden stream. Spraying or splitting = distribution issue."
                },
                {
                  name: "Normcore Spring-Loaded V4",
                  role: "Tamper",
                  specs: [["Mechanism", "Spring calibrated"], ["Target", "15–20kg consistent pressure"], ["Benefit", "Click feedback = correct load every time"]],
                  note: "Press until you feel and hear the spring click. No need to twist or rock. The V4 spring removes tamper pressure as a variable."
                },
                {
                  name: "WDT Needle + Normcore Gravity",
                  role: "Distribution",
                  specs: [["WDT", "Needle stirring tool"], ["Gravity disc", "Normcore weighted distributor"], ["Order", "WDT first, then gravity"]],
                  note: "WDT breaks up clumps and voids. Gravity distributor then levels the bed. Together they're more thorough than either alone. Spin the gravity disc gently — don't over-compress."
                },
              ].map(gear => (
                <div key={gear.name} style={{ background: "#1a0f08", border: "1px solid #2a1a0e", borderRadius: 12, padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                    <div>
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, fontWeight: 700, color: "#f0e4d0" }}>{gear.name}</div>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#c17f3c", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 2 }}>{gear.role}</div>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px", marginBottom: 14 }}>
                    {gear.specs.map(([k, v]) => (
                      <div key={k} style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid #1f120a", paddingBottom: 6 }}>
                        <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#5a3a1a" }}>{k}</span>
                        <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#b0906a" }}>{v}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ borderLeft: "2px solid #3a2010", paddingLeft: 12 }}>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#7a5a3a", lineHeight: 1.7 }}>{gear.note}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* CLEAN TAB */}
        {activeTab === "clean" && (
          <CleanPanel />
        )}

      </div>
    </div>
  );
}

function CleanPanel() {
  const [schedule, setSchedule] = useState("daily");
  const [done, setDone] = useState(() => {
    try { return JSON.parse(localStorage.getItem("espresso_clean_done") || "{}"); } catch { return {}; }
  });
  useEffect(() => {
    try { localStorage.setItem("espresso_clean_done", JSON.stringify(done)); } catch {}
  }, [done]);

  const SCHEDULES = [
    {
      id: "daily",
      freq: "Daily",
      color: "#c17f3c",
      steps: [
        {
          title: "Flush group head",
          detail: "Run a 2–3 second blank (no portafilter) before your first shot of the day to purge stale water from the Stone's shower screen. Do it again before each shot if you've been away from the machine more than 20 minutes.",
          gear: "Stone",
        },
        {
          title: "Purge after each shot",
          detail: "After pulling a shot, run a 1–2 second blank immediately to clear spent coffee residue from the shower screen before it bakes on. Wipe the screen gasket area with a damp cloth.",
          gear: "Stone",
        },
        {
          title: "Rinse portafilter & basket",
          detail: "Knock the puck, then rinse the Normcore 58mm bottomless portafilter and basket under hot water immediately — don't let coffee oils dry in the basket holes. Wipe dry.",
          gear: "Normcore 58mm",
        },
        {
          title: "Wipe distribution tools",
          detail: "Wipe the Normcore gravity distributor disc with a dry cloth after each use. Rinse the WDT needle tips briefly under water and dry — don't leave coffee residue on the needles.",
          gear: "WDT + Normcore Gravity",
        },
        {
          title: "Tap & brush Opus chute",
          detail: "After grinding, tap the Fellow Opus body firmly 2–3 times to dislodge retained grounds (0.5–0.8g typical). Brush the chute exit with the included brush if grounds are clinging.",
          gear: "Fellow Opus",
        },
      ],
    },
    {
      id: "weekly",
      freq: "Weekly",
      color: "#8b5a2a",
      steps: [
        {
          title: "Backflush — water only",
          detail: "Insert a blind basket (solid, no holes) into your portafilter. Lock into the Stone group head. Run 5–6 burst cycles: pump on for 5 seconds, off, repeat. This forces water back through the solenoid valve and clears oils from the group head.",
          gear: "Stone",
        },
        {
          title: "Puly Caff backflush",
          detail: "Add ½ tsp Puly Caff powder to the blind basket. Run 5–6 burst cycles. Then repeat with a clean blind basket and plain water for 4–5 flush cycles. Water must run clear and odourless before you're done.",
          gear: "Stone + Blind Basket",
        },
        {
          title: "Portafilter & basket deep soak",
          detail: "Remove the basket from the bottomless portafilter. Soak both in warm water with a pinch of Puly Caff for 15–20 minutes. Scrub basket holes with a stiff brush. Rinse twice thoroughly. The bottomless design means oils collect on the basket walls — don't skip this.",
          gear: "Normcore 58mm",
        },
        {
          title: "Opus burr brush",
          detail: "Remove the Fellow Opus hopper. Use the included brush to sweep the burr chamber and exit chute. Don't use water near the burrs — brush only. A buildup of stale coffee oil on the 40mm conical burrs directly affects grind flavour.",
          gear: "Fellow Opus",
        },
        {
          title: "Wipe tamper base",
          detail: "Wipe the Normcore Spring V4 base plate with a damp cloth to remove coffee oil residue. Don't submerge the spring mechanism — the calibration spring is not waterproof.",
          gear: "Normcore V4",
        },
        {
          title: "Stone — check drip tray & water tank",
          detail: "Empty and rinse the drip tray. Wipe the 1.2L removable tank interior with a damp cloth. Refill with filtered water — the Stone's dual boiler is sensitive to mineral buildup over time.",
          gear: "Stone",
        },
      ],
    },
    {
      id: "monthly",
      freq: "Monthly",
      color: "#6b3010",
      steps: [
        {
          title: "Deep group head clean",
          detail: "Remove the shower screen (if accessible on the Stone — check your model). Soak in Puly Caff solution for 20–30 minutes. Scrub the screen holes with a group head brush. Rinse and refit. A blocked or partially clogged screen causes uneven water distribution across your 58mm puck.",
          gear: "Stone",
        },
        {
          title: "Opus deep burr clean",
          detail: "Remove the hopper, then use the lifting tabs to remove the ring burr. Brush thoroughly on both sides with a stiff brush. Inspect burr edges — if they look glazed or shiny rather than sharp, they may be approaching the end of their life (typically 200–300kg). Do not wash the burr in water.",
          gear: "Fellow Opus",
        },
        {
          title: "Grindz or rice cleaning (optional)",
          detail: "Run a small amount of Grindz cleaning tablets or uncooked white rice through the Opus at a coarse setting to absorb oils. Follow with a small amount of your coffee to purge any residue before pulling a shot.",
          gear: "Fellow Opus",
        },
        {
          title: "Descale check — Stone dual boiler",
          detail: "Check your Stone's descale indicator or documentation schedule. The 1.5L dual boiler system is vulnerable to limescale in hard water areas — descale with a dedicated espresso machine descaler or citric acid solution. Follow the Stone's specific descale procedure exactly; each boiler must be descaled in sequence.",
          gear: "Stone",
        },
        {
          title: "Inspect group head gasket & seal",
          detail: "Examine the portafilter seal (the rubber ring in the Stone's group head). If it's cracked, brittle, or the portafilter feels loose when locking in, the gasket needs replacing. A worn gasket causes pressure leaks and inconsistent extraction — this is the first thing to check if shots become unpredictable despite good prep.",
          gear: "Stone",
        },
        {
          title: "Full portafilter hardware check",
          detail: "Inspect the Normcore 58mm bottomless portafilter — check the basket isn't bent or dented (this affects how the puck seats). Look for hairline cracks around the spout area. A warped basket is a surprisingly common source of persistent channeling that prep technique alone can't fix.",
          gear: "Normcore 58mm",
        },
      ],
    },
  ];

  const current = SCHEDULES.find(s => s.id === schedule);
  const completedCount = current.steps.filter((_, i) => done[`${schedule}-${i}`]).length;
  const scheduleColor = { daily: "#c17f3c", weekly: "#8b5a2a", monthly: "#6b3010" };

  const CLEAN_TIPS = [
    "Never use dish soap on the portafilter basket or group head — soap residue destroys crema and flavour for multiple shots.",
    "Puly Caff is not optional. Water alone doesn't remove coffee oils. Rancid oils in the group head = bitter, flat, one-dimensional shots.",
    "The bottomless portafilter shows contamination you'd never notice on a spouted one — inspect the basket walls regularly.",
    "The Stone has two separate boilers. If descaling, both need attention — check whether your machine has a single or dual descale cycle.",
    "Rinse everything twice after Puly Caff. Even trace chemical residue will ruin the next shot and is detectable by taste.",
    "The Fellow Opus 40mm conical burrs are the most critical cleaning surface. Stale oil on burrs = muddy, flat flavour regardless of how fresh your beans are.",
  ];

  return (
    <div className="slide-in">
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, marginBottom: 8, color: "#c17f3c" }}>
        Cleaning Guide
      </div>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#5a3a1a", marginBottom: 28 }}>
        Stone · Fellow Opus · Normcore 58mm · Spring Tamper V4 · WDT + Gravity
      </div>

      {/* Schedule tabs */}
      <div className="cat-filter" style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {SCHEDULES.map(s => (
          <button key={s.id} onClick={() => setSchedule(s.id)} style={{
            padding: "8px 20px", borderRadius: 6,
            background: schedule === s.id ? s.color + "22" : "transparent",
            border: `1px solid ${schedule === s.id ? s.color : "#2a1a0e"}`,
            color: schedule === s.id ? s.color : "#5a3a1a",
            fontFamily: "'DM Mono', monospace", fontSize: 11,
            letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer",
          }}>{s.freq}</button>
        ))}
      </div>

      {/* Progress bar */}
      <div style={{ background: "#1a0f08", border: "1px solid #2a1a0e", borderRadius: 10, padding: "12px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 16 }}>
        <div style={{ flex: 1, height: 4, background: "#0f0905", borderRadius: 2, overflow: "hidden" }}>
          <div style={{
            height: "100%",
            width: `${(completedCount / current.steps.length) * 100}%`,
            background: scheduleColor[schedule],
            borderRadius: 2, transition: "width 0.3s",
          }} />
        </div>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: scheduleColor[schedule], whiteSpace: "nowrap" }}>
          {completedCount} / {current.steps.length} done
        </div>
        <button onClick={() => setDone(d => {
          const n = {...d};
          current.steps.forEach((_, i) => delete n[`${schedule}-${i}`]);
          return n;
        })} style={{ background: "none", border: "none", color: "#3a2010", fontFamily: "'DM Mono', monospace", fontSize: 9, cursor: "pointer", letterSpacing: "0.1em", textTransform: "uppercase" }}>
          RESET
        </button>
      </div>

      {/* Steps */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
        {current.steps.map((step, i) => {
          const key = `${schedule}-${i}`;
          const isDone = done[key];
          return (
            <div key={i} onClick={() => setDone(d => ({ ...d, [key]: !d[key] }))} style={{
              background: "#1a0f08",
              border: `1px solid ${isDone ? scheduleColor[schedule] + "88" : "#2a1a0e"}`,
              borderRadius: 10, padding: "16px 20px",
              display: "flex", gap: 16, alignItems: "flex-start",
              cursor: "pointer", opacity: isDone ? 0.55 : 1, transition: "opacity 0.2s",
            }}>
              <div style={{
                width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
                background: isDone ? scheduleColor[schedule] : "#0f0905",
                border: `2px solid ${isDone ? scheduleColor[schedule] : "#3a2010"}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                color: isDone ? "#0f0905" : "#5a3a1a",
                fontFamily: "'DM Mono', monospace", fontSize: isDone ? 13 : 11, fontWeight: 700,
              }}>{isDone ? "✓" : i + 1}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 6, flexWrap: "wrap" }}>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: isDone ? "#5a3a1a" : "#f0e4d0" }}>{step.title}</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: scheduleColor[schedule], background: scheduleColor[schedule] + "18", border: `1px solid ${scheduleColor[schedule]}44`, borderRadius: 4, padding: "2px 8px", letterSpacing: "0.1em", textTransform: "uppercase" }}>{step.gear}</div>
                </div>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#5a3a1a", lineHeight: 1.8 }}>{step.detail}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Puly step-by-step callout for weekly */}
      {schedule === "weekly" && (
        <div style={{ background: "#150d06", border: "1px solid #8b5a2a", borderRadius: 10, padding: 20, marginBottom: 20 }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#8b5a2a", letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>Puly Caff Backflush — Exact Sequence</div>
          {[
            "Insert solid blind basket (no holes) into portafilter",
            "Add ½ tsp Puly Caff powder to the basket",
            "Lock portafilter into the Stone group head",
            "Press brew button: run 5 seconds on, release — repeat 5–6 times",
            "Remove portafilter and discard residue",
            "Re-lock with clean blind basket, no powder",
            "Run 4–5 burst cycles with plain water only",
            "Water must run clear and with no chemical smell before you stop",
          ].map((t, i) => (
            <div key={i} style={{ display: "flex", gap: 10, marginBottom: 7, alignItems: "flex-start" }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#8b5a2a", width: 18, flexShrink: 0 }}>{i + 1}.</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#7a5a3a", lineHeight: 1.6 }}>{t}</div>
            </div>
          ))}
        </div>
      )}

      {/* Tips */}
      <div style={{ background: "#1a0f08", border: "1px solid #2a1a0e", borderRadius: 10, padding: 20 }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#c17f3c", marginBottom: 14 }}>Watch Out For</div>
        {CLEAN_TIPS.map((tip, i) => (
          <div key={i} style={{ display: "flex", gap: 12, marginBottom: 10, alignItems: "flex-start" }}>
            <div style={{ color: "#c17f3c", fontSize: 12, flexShrink: 0, marginTop: 1 }}>→</div>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#5a3a1a", lineHeight: 1.75 }}>{tip}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<EspressoApp />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
